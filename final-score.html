<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Score</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Robot + Trophy side-by-side */
        .result-header {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            width: 100%;
        }

        .result-images {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .result-robot {
            width: 200px;
            animation: bounce 1.2s infinite ease-in-out;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }

        .result-trophy {
            width: 160px;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 2px gold); }
            to { filter: drop-shadow(0 0 12px gold); }
        }

        h1 {
            font-size: 36px;
            margin-top: 20px;
            color: #333;
        }

        .well-done {
            font-size: 40px;
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #005fcc;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            background: red;
            opacity: 0.8;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(120vh) rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="result-header">
            <div class="result-images">
                <img src="assets/robot/robot-victory.png" class="result-robot" alt="Robot">
                <img src="assets/robot/trophy.png" class="result-trophy" alt="Trophy">
            </div>
        </div>

        <div class="well-done">🎉 Well done! 🎉</div>

        <h1 id="finalScoreText">Final score: 0%</h1>

        <div class="buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="level1.html" class="btn">Retry</a>
        </div>

    </div>

    <!-- Celebration sound -->
    <audio id="celebrateSound" src="sounds/victory.mp3"></audio>

    <script>
        // Load score
        const score = localStorage.getItem("finalScore") || 0;
        document.getElementById("finalScoreText").textContent = `Final score: ${score}%`;

        // Play sound
        const sound = document.getElementById("celebrateSound");
        sound.volume = 0.5;
        sound.play();

        // Confetti generator
        function createConfetti() {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.backgroundColor = ["red","blue","yellow","green","purple","orange"][Math.floor(Math.random()*6)];
            confetti.style.animationDuration = (2 + Math.random() * 2) + "s";

            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 4000);
        }

        setInterval(createConfetti, 150);
    </script>

</body>
</html>
