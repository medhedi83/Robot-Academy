<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Score</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Robot + Trophy side-by-side */
        .result-header {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .result-images {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .result-robot {
            width: 200px;
        }

        .result-trophy {
            width: 160px;
        }

        h1 {
            font-size: 32px;
            margin-top: 30px;
            color: #333;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 20px;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }

        .btn:hover {
            background: #005fcc;
        }
    </style>
</head>

        <div class="result-header">
