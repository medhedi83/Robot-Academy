<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Score</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .result-header {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            width: 100%;
        }

        .result-images {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .result-trophy {
            width: 160px;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .result-robot {
            width: 200px;
            animation: bounce 1.2s infinite ease-in-out;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }

        h1 {
            font-size: 36px;
            margin-top: 20px;
            color: #333;
        }

        .well-done {
            font-size: 40px;
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.2); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 20px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="result-header">
            <div class="result-images">
                <img src="assets/robot/trophy.png" class="result-trophy" alt="Trophy">
                <img src="assets/robot/robot-victory.png" class="result-robot" alt="Robot">
            </div>
        </div>

        <div class="well-done">🎉 Well done! 🎉</div>

        <h1 id="finalScoreText">Final score: 0%</h1>

        <div class="buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="level1.html" class="btn">Retry</a>
        </div>

    </div>

    <audio id="celebrateSound" src="sounds/victory.mp3"></audio>

    <script>
        const score = localStorage.getItem("finalScore") || 0;
        document.getElementById("finalScoreText").textContent = `Final score: ${score}%`;

        const sound = document.getElementById("celebrateSound");
        sound.volume = 0.5;
        sound.play();
    </script>

</body>
</html>
